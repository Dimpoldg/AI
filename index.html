<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header{
  padding:15px;
  text-align:center;
  background:#1e293b;
}

.chat{
  flex:1;
  padding:10px;
  overflow-y:auto;
}

.msg{
  margin:5px;
  padding:10px;
  border-radius:10px;
  max-width:75%;
}

.user{background:#22c55e; align-self:flex-end;}
.bot{background:#334155;}

.input{
  display:flex;
  padding:10px;
  background:#1e293b;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button{
  margin-left:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* TYPING */
#typing{
  display:none;
  margin:5px;
  color:#94a3b8;
  font-size:14px;
}

/* FLOATING BUTTON */
.ai-float{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:linear-gradient(45deg,#3b82f6,#22c55e);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(59,130,246,0.7);
  animation:pulse 1.5s infinite;
  user-select:none;
}

.ai-float:hover{
  transform:scale(1.1);
}

@keyframes pulse{
  0% { box-shadow:0 0 10px rgba(59,130,246,0.5); }
  50% { box-shadow:0 0 25px rgba(34,197,94,0.9); }
  100% { box-shadow:0 0 10px rgba(59,130,246,0.5); }
}
</style>
</head>

<body>

<div class="header">🤖 Jarvis AI (No API)</div>

<div id="chat" class="chat"></div>

<div id="typing">🤖 Jarvis is typing...</div>

<div class="input">
  <input id="msg" placeholder="Type or Speak...">
  <button onclick="send()">Send</button>
  <button onclick="startListening()">🎤</button>
  <button onclick="clearChat()">🗑️</button>
</div>

<!-- FLOATING BUTTON -->
<div class="ai-float" onclick="startListening()">🎤</div>

<script>

let memory = JSON.parse(localStorage.getItem("memory")) || {};
let chats = JSON.parse(localStorage.getItem("chats")) || [];

function save(){
  localStorage.setItem("memory",JSON.stringify(memory));
  localStorage.setItem("chats",JSON.stringify(chats));
}

function addMsg(text,type){
  let div=document.createElement("div");
  div.className="msg "+type;
  div.innerText=text;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop=99999;
}

// LOAD OLD CHAT
chats.forEach(c=>addMsg(c.text,c.type));

// VOICE INPUT
let recognition = new webkitSpeechRecognition();
recognition.lang="hi-IN";

function startListening(){
  recognition.start();
}

recognition.onresult=function(e){
  let text=e.results[0][0].transcript;
  document.getElementById("msg").value=text;
  send();
};

// SPEAK
function speak(text){
  let speech=new SpeechSynthesisUtterance(text);
  speech.lang="hi-IN";
  speechSynthesis.speak(speech);
}

// CLEAR CHAT
function clearChat(){
  document.getElementById("chat").innerHTML="";
  chats=[];
  save();
}

// AI LOGIC
function getAI(msg){

  msg=msg.toLowerCase();

  if(msg.includes("mera naam")){
    let name=msg.split(" ").pop();
    memory.name=name;
    save();
    return "ठीक है "+name+" 😊";
  }

  if(msg.includes("mera naam kya hai")){
    return memory.name ? "आपका naam "+memory.name+" hai" : "Mujhe nahi pata";
  }

  if(msg.includes("hello")||msg.includes("namaste")){
    return "Namaste 👋";
  }

  if(msg.includes("time")){
    return "Abhi time hai "+new Date().toLocaleTimeString();
  }

  if(msg.includes("date")){
    return "Aaj date hai "+new Date().toLocaleDateString();
  }

  if(msg.includes("instagram")){
    window.open("https://instagram.com");
    return "Instagram khol raha hoon";
  }

  if(msg.includes("whatsapp")){
    window.open("https://web.whatsapp.com");
    return "WhatsApp khol raha hoon";
  }

  if(msg.includes("facebook")){
    window.open("https://facebook.com");
    return "Facebook khol raha hoon";
  }

  if(msg.includes("youtube")){
    window.open("https://youtube.com");
    return "YouTube open kar raha hoon";
  }

  if(msg.includes("google")){
    window.open("https://google.com");
    return "Google open kar raha hoon";
  }

  if(msg.includes("search")){
    let query = msg.replace("search","").trim();
    if(query){
      window.open("https://www.google.com/search?q=" + encodeURIComponent(query));
      return query + " search kar raha hoon";
    }
    return "Kya search karna hai?";
  }

  if(msg.includes("joke")){
    return "Teacher: Homework kahan hai? Student: Network issue 😂";
  }

  return "Main seekh raha hoon 🤖 aur pucho";
}

// SEND MESSAGE
function send(){
  let input=document.getElementById("msg");
  let text=input.value;
  if(text==="") return;

  addMsg("🧑 "+text,"user");
  chats.push({text:"🧑 "+text,type:"user"});

  document.getElementById("typing").style.display="block";

  let reply=getAI(text);

  setTimeout(()=>{
    document.getElementById("typing").style.display="none";

    addMsg("🤖 "+reply,"bot");
    chats.push({text:"🤖 "+reply,type:"bot"});
    save();
    speak(reply);
  },1000);

  input.value="";
}
</script>

</body>
</html>
